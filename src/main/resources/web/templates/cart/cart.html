<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | GeekStore</title>
    <link rel="stylesheet" type="text/css" th:href="@{/styles/base.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/styles/components.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/styles/layout.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/styles/product/cart.css}">
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="nav">
            <a href="/" class="logo">GeekStore</a>
            <div class="nav-links">
                <a href="/products" class="nav-link">Products</a>
                <a href="/cart" class="nav-link">
                    Cart <span class="cart-count" th:text="${@shoppingCartService.getTotalItems()}">0</span>
                </a>
                <a href="/orders" class="nav-link">Orders</a>
            </div>
        </nav>
    </div>
</header>

<main class="main">
    <div class="container">
        <h1 class="text-2xl font-bold mb-6">Your Shopping Cart</h1>

        <div th:if="${items.empty}" class="empty-cart shadow rounded p-8 text-center">
            <div class="empty-icon text-4xl mb-4">🛒</div>
            <p class="empty-text">Your cart is empty</p>
            <a href="/products" class="btn btn-primary">Continue Shopping</a>
        </div>

        <div th:unless="${items.empty}">
            <div class="space-y-4">
                <div th:each="item : ${items}" class="cart-item shadow-sm">
                    <img th:src="${item.product.imageUrl}" alt="Product image" class="cart-item-img">
                    <div class="cart-item-details">
                        <h3 class="cart-item-title" th:text="${item.product.name}"></h3>
                        <p class="cart-item-price"
                           th:text="'$' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"></p>
                    </div>
                    <div class="cart-item-actions">
                        <form th:action="@{/cart/update/{id}(id=${item.product.id})}" method="post"
                              class="quantity-control">
                            <button type="button" class="quantity-btn"
                                    onclick="this.nextElementSibling.stepDown(); this.nextElementSibling.dispatchEvent(new Event('change'))">
                                -
                            </button>
                            <input type="number"
                                   name="quantity"
                                   th:value="${item.quantity}"
                                   min="1"
                                   class="quantity-input"
                                   onchange="this.form.submit()">
                            <button type="button" class="quantity-btn"
                                    onclick="this.previousElementSibling.stepUp(); this.previousElementSibling.dispatchEvent(new Event('change'))">
                                +
                            </button>
                        </form>
                        <form th:action="@{/cart/remove/{id}(id=${item.product.id})}" method="post" class="mt-2">
                            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="cart-summary shadow rounded mt-8">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}"></span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>Free</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total:</span>
                    <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}"></span>
                </div>

                <div class="flex justify-between mt-6">
                    <a href="/products" class="btn btn-outline">Continue Shopping</a>
                    <form th:action="@{/orders/checkout}" method="post">
                        <button type="submit" class="btn btn-primary">Checkout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
